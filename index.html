<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Dashboard</title>
</head>
<body>
    <div class="sidebar">
        <div class="dashboard">
            <svg class="dash-icon"></svg>
            <p>DashBoard</p>
        </div>
        <div class="major">
            <div class="Home">
                <svg class="home-icon"></svg>
                <p>Home</p>
            </div>
            <div class="Profile">
                <svg class="profile-icon"></svg>
                <p>Profile</p>
            </div>
            <div class="Messages">
                <svg class="msg-icon"></svg>
                <p>Messages</p>
            </div>
            <div class="History">
                <svg class="his-icon"></svg>
                <p>History</p>
            </div>
            <div class="Tasks">
                <svg class="task-icon"></svg>
                <p>Tasks</p>
            </div>
            <div class="Communities">
                <svg class="community-icon"></svg>
                <p>Communities</p>
            </div>
        </div>
        <div class="minor">
            <div class="Settings">
                <svg class="setting-icon"></svg>
                <p>Settings</p>
            </div>
            <div class="Support">
                <svg class="support-icon"></svg>
                <p>Support</p>
            </div>
            <div class="Privacy">
                <svg class="privacy-icon"></svg>
                <p>Privacy</p>
            </div>
        </div>
    </div>

    <div class="header">
        <div class="top-left">
            <label for="search-bar" class="search-icon">
                <svg class="search-icon">
                </svg>
            </label>
            <input type="text" id="search-bar" name="search">
        </div>
        <div class="top-right">
            <svg class="notification-icon"></svg>
            <img src="./asset/img_avatar.png" alt="avatar" class="avatar" width="30" height="30">
            <p>Micky Robert</p>
        </div>
        <div class="bottom-left">
            <img src="./asset/img_avatar.png" alt="avatar" class="avatar-L" width="60" height="60">
            <p>Hi there,</p>
            <p>Micky Robert (@micky)</p>
        </div>
        <div class="bottom-right">
            <button>New</button>
            <button>Upload</button>
            <button>Share</button>
        </div>
    </div>

    <div class="main">
        <div class="left-main"></div>
        <div class="right-main">
            <div class="announcement"></div>
            <div class="trending"></div>
        </div>
    </div> 
</body>
</html>
